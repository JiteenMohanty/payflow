# Production compose (ADR-0013): a single VPS running this file is the
# whole deployment. Only nginx exposes ports to the host (80/443) - every
# other service is reachable only over the internal Compose network, unlike
# docker-compose.yml (dev), which host-exposes everything for local access
# from host-launched jars. Secrets come from infra/.env (see .env.example),
# never committed.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: payflow
      POSTGRES_USER: payflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payflow -d payflow"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  kafka:
    image: apache/kafka:3.8.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      # Internal service DNS name, not localhost - unlike dev, nothing
      # outside this Compose network ever connects to Kafka directly.
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: payflow-prod-kraft-cluster
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    volumes:
      - ./observability/prometheus/prometheus.prod.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.60
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.112.0
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./observability/otel-collector/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    depends_on:
      - jaeger
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.1
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      # Not internet-facing on its own port here - only reachable via
      # nginx's Basic-Auth-gated /grafana/ path (see infra/nginx/nginx.conf).
      # Anonymous Viewer + that gate together are what ADR-0012's own
      # disclosed gap called for: "network isolation or scrape-time
      # credentials in front of it."
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      # Required for correct asset/link URLs when served under a subpath
      # instead of Grafana's own root.
      GF_SERVER_ROOT_URL: https://${DOMAIN}/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - jaeger
    restart: unless-stopped

  payflow-core:
    # `docker compose build` builds this from source (this repo's own
    # Dockerfile). `docker compose pull` fetches the CI-published image
    # instead - no source checkout needed at all on a real deploy host,
    # per ADR-0013.
    image: ghcr.io/jiteenmohanty/payflow-core:latest
    build:
      context: ../backend
      dockerfile: payflow-core/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://postgres:5432/payflow
      DATABASE_USERNAME: payflow
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      MOCK_PROVIDER_BASE_URL: http://mock-provider-service:8081
      MOCK_PROVIDER_WEBHOOK_SECRET: ${MOCK_PROVIDER_WEBHOOK_SECRET:?MOCK_PROVIDER_WEBHOOK_SECRET is required}
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://otel-collector:4318/v1/traces
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    restart: unless-stopped

  mock-provider-service:
    image: ghcr.io/jiteenmohanty/mock-provider-service:latest
    build:
      context: ../backend
      dockerfile: mock-provider-service/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: prod
      PAYFLOW_CORE_BASE_URL: http://payflow-core:8080
      MOCK_PROVIDER_WEBHOOK_SECRET: ${MOCK_PROVIDER_WEBHOOK_SECRET:?MOCK_PROVIDER_WEBHOOK_SECRET is required}
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://otel-collector:4318/v1/traces
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  nginx:
    image: ghcr.io/jiteenmohanty/payflow-nginx:latest
    build:
      context: ..
      dockerfile: infra/nginx/Dockerfile
      args:
        VITE_GRAFANA_URL: /grafana
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
      - certbot-webroot:/var/www/certbot:ro
    depends_on:
      payflow-core:
        condition: service_healthy
    restart: unless-stopped

  # Real Let's Encrypt issuance/renewal (webroot method, matching the
  # /.well-known/acme-challenge/ location in nginx.conf) - not something
  # this project can run for real without an owned domain, so this service
  # is correct and ready to use but only ever exercised manually per
  # docs/DEPLOYMENT.md, not started by default with `up -d`.
  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./nginx/ssl:/etc/letsencrypt/live-copy
      - certbot-webroot:/var/www/certbot
    profiles: ["certbot"]

volumes:
  postgres-data:
  redis-data:
  kafka-data:
  prometheus-data:
  grafana-data:
  certbot-webroot:
