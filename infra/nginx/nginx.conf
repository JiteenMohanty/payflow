user  nginx;
worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout  65;

    # M13: HTTP exists only to redirect to HTTPS and to serve the
    # certbot webroot challenge for Let's Encrypt renewal - see
    # docs/DEPLOYMENT.md.
    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        root  /usr/share/nginx/html;
        index index.html;

        # Merchant-facing + dashboard API, proxied as-is (payflow-core's own
        # routes already start with /v1, so no rewrite/strip here).
        location /v1/ {
            proxy_pass http://payflow-core:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # For an external uptime monitor / load balancer health check -
        # matches the same permitAll surface SecurityConfig already exposes.
        location = /actuator/health {
            proxy_pass http://payflow-core:8080;
            proxy_set_header Host $host;
        }

        # M13 gap fix: M10 shipped Grafana with anonymous Viewer access,
        # explicitly disclosed as acceptable only for the localhost-scraped
        # dev stack and noting "a real internet-facing deployment would need
        # network isolation or scrape-time credentials in front of it"
        # (ADR-0012 / SecurityConfig). Grafana itself has no public port in
        # docker-compose.prod.yml - this is the only path to it, gated by
        # HTTP Basic Auth (see docs/DEPLOYMENT.md for generating
        # /etc/nginx/.htpasswd). The M12 admin dashboard's Metrics page
        # embeds this same path via <iframe src="/grafana/...">.
        location /grafana/ {
            auth_basic           "PayFlow Metrics";
            auth_basic_user_file /etc/nginx/.htpasswd;

            # No trailing path after the upstream here, deliberately - a
            # trailing "/" (proxy_pass http://grafana:3000/;) strips the
            # /grafana prefix before forwarding, but GF_SERVER_SERVE_FROM_SUB_PATH
            # expects that prefix preserved on every request. Stripping it
            # produced an infinite redirect loop (Grafana kept redirecting
            # back to the /grafana/... URL it expected, Nginx kept stripping
            # it again on the retry) - found and fixed during this
            # milestone's own manual verification pass.
            proxy_pass http://grafana:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # The admin-dashboard SPA. try_files falls back to index.html for
        # any path React Router owns (e.g. /organizations/{id}/dashboard) -
        # those are client-side routes, not real files on disk.
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
