global:
  scrape_interval: 10s

scrape_configs:
  # Unlike dev's prometheus.yml (which scrapes host-launched jars via
  # host.docker.internal - see that file's own note), payflow-core and
  # mock-provider-service run as containers on this same Compose network in
  # production, reachable directly by their service names.
  - job_name: payflow-core
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["payflow-core:8080"]

  - job_name: mock-provider-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["mock-provider-service:8081"]
