name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Build and test
        run: mvn -B verify

  # M13 gap fix: CI only ever built/tested the backend - the frontend
  # (added M12) had no CI gate at all, so a broken build or lint failure
  # would only ever surface manually.
  frontend-build-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/admin-dashboard
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/admin-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  # M13 (ADR-0013): CI publishes versioned images to GHCR on every merge to
  # main - it stops there. There is no live server this project owns to
  # deploy to, so there is no further "deploy" step; docs/DEPLOYMENT.md
  # documents the real remaining step (pull + up -d on an actual VPS) as a
  # manual operation using the images this publishes.
  publish-images:
    runs-on: ubuntu-latest
    needs: [backend-build-test, frontend-build-lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: payflow-core
            context: backend
            dockerfile: backend/payflow-core/Dockerfile
          - image: mock-provider-service
            context: backend
            dockerfile: backend/mock-provider-service/Dockerfile
          - image: payflow-nginx
            context: .
            dockerfile: infra/nginx/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          # GHCR requires a lowercase image path - github.repository_owner
          # preserves the account's actual casing (e.g. "JiteenMohanty"),
          # which would otherwise make this push fail.
          tags: |
            ghcr.io/${{ toLower(github.repository_owner) }}/${{ matrix.image }}:latest
            ghcr.io/${{ toLower(github.repository_owner) }}/${{ matrix.image }}:${{ github.sha }}
