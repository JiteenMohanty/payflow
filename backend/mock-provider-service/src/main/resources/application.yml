spring:
  application:
    name: mock-provider-service

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}

payflow:
  webhook:
    callback-base-url: ${PAYFLOW_CORE_BASE_URL:http://localhost:8080}
    # Must match payflow-core's payflow.provider.mock.webhook-secret exactly
    # - this is the shared secret both sides sign/verify inbound webhooks
    # with (see ADR-0011, EDD section 5.4).
    secret: ${MOCK_PROVIDER_WEBHOOK_SECRET:dev-mock-webhook-secret-3f8a91c2}
