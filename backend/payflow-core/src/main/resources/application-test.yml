spring:
  flyway:
    enabled: true
    locations: classpath:db/migration

payflow:
  security:
    encryption-key: M+Gn9EGNdnD8i/r1+Pu9ipAZfBjsfahlPsyVvgbqT80=
    jwt:
      secret: DwYOwf5/PG/Mpk6zODEfFznfCeCjKLbCmVGBZG0n3FrE0YGvFrUVd7Pb2A0ZGBrP
  provider:
    mock:
      base-url: http://localhost:8081
      webhook-secret: test-mock-webhook-secret-3f8a91c2
  outbox:
    # Long enough that the schedule itself never fires during a test run -
    # tests call OutboxPublisher.relayPendingEvents() directly instead, so
    # assertions never race the background poll.
    poll-interval-ms: 3600000
  expired-authorization:
    sweep-interval-ms: 3600000
  reconciliation:
    sweep-interval-ms: 3600000
  outbox-cleanup:
    # February never has a 31st, so this cron expression never matches -
    # the standard idiom for "effectively disabled" rather than a plausible
    # long interval, since @Scheduled(cron=...) has no fixedDelay-style
    # millisecond escape hatch.
    cron: "0 0 3 31 2 *"
  idempotency-cleanup:
    cron: "0 0 3 31 2 *"
  webhook-retry:
    poll-interval-ms: 3600000

management:
  tracing:
    sampling:
      probability: 0

logging:
  level:
    com.payflow: DEBUG
    org.testcontainers: INFO
