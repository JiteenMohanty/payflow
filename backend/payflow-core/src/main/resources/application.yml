spring:
  application:
    name: payflow-core
  profiles:
    active: dev
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  kafka:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      properties:
        # KafkaTemplate.send() itself blocks synchronously while the
        # producer fetches initial cluster metadata - that block is bounded
        # by max.block.ms, NOT by OutboxPublisher's own .get(timeout) call
        # on the returned future (found via manual verification: with
        # Kafka down, each retry attempt took ~60s, the client default,
        # instead of OutboxPublisher's intended ~5s). Set below its own
        # SEND_TIMEOUT_SECONDS so that timeout is actually the effective
        # bound on how long one publish attempt can take.
        max.block.ms: 3000
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # WebhookDispatcher's consumer group ("webhook-dispatcher") has never
      # committed an offset on first connect - earliest means it processes
      # whatever's already on the topic rather than silently skipping it,
      # consistent with the project's at-least-once philosophy (ADR-0002).
      auto-offset-reset: earliest

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

payflow:
  security:
    jwt:
      access-token-ttl-minutes: 15
      refresh-token-ttl-days: 7
  idempotency:
    key-ttl-hours: 24
    redis-cache-ttl-minutes: 60
  outbox:
    poll-interval-ms: 500
    batch-size: 100
    max-retries: 5
