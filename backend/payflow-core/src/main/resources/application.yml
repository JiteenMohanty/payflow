spring:
  application:
    name: payflow-core
  profiles:
    active: dev
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  kafka:
    template:
      # Wraps each send() in a Micrometer Observation - metrics plus, when a
      # trace is active on the calling thread, a traceparent header on the
      # record so a consumer-side span (below) links back to it (ADR-0012).
      observation-enabled: true
    listener:
      observation-enabled: true
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      properties:
        # KafkaTemplate.send() itself blocks synchronously while the
        # producer fetches initial cluster metadata - that block is bounded
        # by max.block.ms, NOT by OutboxPublisher's own .get(timeout) call
        # on the returned future (found via manual verification: with
        # Kafka down, each retry attempt took ~60s, the client default,
        # instead of OutboxPublisher's intended ~5s). Set below its own
        # SEND_TIMEOUT_SECONDS so that timeout is actually the effective
        # bound on how long one publish attempt can take.
        max.block.ms: 3000
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # WebhookDispatcher's consumer group ("webhook-dispatcher") has never
      # committed an offset on first connect - earliest means it processes
      # whatever's already on the topic rather than silently skipping it,
      # consistent with the project's at-least-once philosophy (ADR-0002).
      auto-offset-reset: earliest

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
      # Kubernetes-style liveness/readiness groups (health.livenessState /
      # health.readinessState auto-contribute) - separate from the plain
      # "health" endpoint above, which stays the human/dashboard-facing view.
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  tracing:
    sampling:
      # 1.0 in dev/prod is a deliberate choice for a system at this scale
      # (ADR-0012: "correctness bugs manifest as silent backlogs or drift",
      # which sampling would risk missing) - overridden to 0 in test so
      # Testcontainers runs never attempt to reach a collector that isn't
      # part of the test environment.
      probability: 1.0
  otlp:
    tracing:
      # The otel-collector container's published OTLP/HTTP port -
      # payflow-core runs as a host-launched jar, not inside docker-compose
      # (see README Quick Start), so this is a real localhost port mapping,
      # not a container-to-container address.
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}

# EDD risk table (section 12): "Exponential backoff with jitter on ... provider
# client retries; circuit breaker around ProviderClient" - one shared named
# instance for now (only the Mock Provider adapter exists), applied generically
# to every ProviderClient by ResilientProviderClient (M11) regardless of which
# provider it wraps.
resilience4j:
  retry:
    instances:
      providerClient:
        max-attempts: 3
        wait-duration: 200ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        enable-randomized-wait: true
        randomized-wait-factor: 0.5
        retry-exceptions:
          - com.payflow.core.common.exception.ProviderCommunicationException
  circuitbreaker:
    instances:
      providerClient:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        record-exceptions:
          - com.payflow.core.common.exception.ProviderCommunicationException

payflow:
  security:
    jwt:
      access-token-ttl-minutes: 15
      refresh-token-ttl-days: 7
  idempotency:
    key-ttl-hours: 24
    redis-cache-ttl-minutes: 60
  outbox:
    poll-interval-ms: 500
    batch-size: 100
    max-retries: 5
  expired-authorization:
    sweep-interval-ms: 3600000
    # Real providers typically hold an uncaptured authorization for about a
    # week before it lapses on their own side - this mirrors that locally
    # rather than expiring sooner than the provider itself would.
    auth-window-hours: 168
  reconciliation:
    sweep-interval-ms: 900000
    # Short by design (ADR-0011) - this exists to catch a lost webhook
    # quickly, well before ExpiredAuthorizationJob's much longer window
    # would otherwise give up on the payment entirely.
    stale-window-minutes: 15
  outbox-cleanup:
    cron: "0 0 3 * * *"
    retention-days: 30
  idempotency-cleanup:
    cron: "0 30 3 * * *"
  webhook-retry:
    poll-interval-ms: 30000
    batch-size: 100
    # WebhookBackoff caps a single delay at 1 hour, so 6 attempts is roughly
    # a day of retrying (30s, 1m, 2m, 4m, ... up to the 1h cap) before
    # giving up on a merchant endpoint that's been down the whole time.
    max-attempts: 6
