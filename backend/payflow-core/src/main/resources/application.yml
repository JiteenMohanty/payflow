spring:
  application:
    name: payflow-core
  profiles:
    active: dev
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  kafka:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      properties:
        # KafkaTemplate.send() itself blocks synchronously while the
        # producer fetches initial cluster metadata - that block is bounded
        # by max.block.ms, NOT by OutboxPublisher's own .get(timeout) call
        # on the returned future (found via manual verification: with
        # Kafka down, each retry attempt took ~60s, the client default,
        # instead of OutboxPublisher's intended ~5s). Set below its own
        # SEND_TIMEOUT_SECONDS so that timeout is actually the effective
        # bound on how long one publish attempt can take.
        max.block.ms: 3000
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # WebhookDispatcher's consumer group ("webhook-dispatcher") has never
      # committed an offset on first connect - earliest means it processes
      # whatever's already on the topic rather than silently skipping it,
      # consistent with the project's at-least-once philosophy (ADR-0002).
      auto-offset-reset: earliest

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

payflow:
  security:
    jwt:
      access-token-ttl-minutes: 15
      refresh-token-ttl-days: 7
  idempotency:
    key-ttl-hours: 24
    redis-cache-ttl-minutes: 60
  outbox:
    poll-interval-ms: 500
    batch-size: 100
    max-retries: 5
  expired-authorization:
    sweep-interval-ms: 3600000
    # Real providers typically hold an uncaptured authorization for about a
    # week before it lapses on their own side - this mirrors that locally
    # rather than expiring sooner than the provider itself would.
    auth-window-hours: 168
  reconciliation:
    sweep-interval-ms: 900000
    # Short by design (ADR-0011) - this exists to catch a lost webhook
    # quickly, well before ExpiredAuthorizationJob's much longer window
    # would otherwise give up on the payment entirely.
    stale-window-minutes: 15
  outbox-cleanup:
    cron: "0 0 3 * * *"
    retention-days: 30
  idempotency-cleanup:
    cron: "0 30 3 * * *"
  webhook-retry:
    poll-interval-ms: 30000
    batch-size: 100
    # WebhookBackoff caps a single delay at 1 hour, so 6 attempts is roughly
    # a day of retrying (30s, 1m, 2m, 4m, ... up to the 1h cap) before
    # giving up on a merchant endpoint that's been down the whole time.
    max-attempts: 6
